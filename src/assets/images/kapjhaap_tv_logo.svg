<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 320" width="100%" height="100%">
  <defs>
    <!-- Metallic Silver Main Gradient -->
    <linearGradient id="metallic-silver" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="20%" stop-color="#F1F5F9" />
      <stop offset="50%" stop-color="#CBD5E1" />
      <stop offset="80%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>

    <!-- 3D Bevel Dark Gradient for Stroke Depth -->
    <linearGradient id="bevel-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Star Light Facet -->
    <linearGradient id="star-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#CBD5E1" />
    </linearGradient>

    <!-- Star Dark Facet -->
    <linearGradient id="star-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8" />
      <stop offset="100%" stop-color="#475569" />
    </linearGradient>

    <!-- TV Block Letter Metallic Gradient -->
    <linearGradient id="tv-metallic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2E8F0" />
      <stop offset="35%" stop-color="#94A3B8" />
      <stop offset="65%" stop-color="#475569" />
      <stop offset="100%" stop-color="#94A3B8" />
    </linearGradient>

    <!-- Soft Drop Shadow Filter -->
    <filter id="metallic-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="1" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.6" />
      <feDropShadow dx="0" dy="0" stdDeviation="1" flood-color="#FFFFFF" flood-opacity="0.3" />
    </filter>
  </defs>

  <style>
    .script-text {
      font-family: 'Brush Script MT', 'Dancing Script', 'Great Vibes', 'Caveat', 'Segoe Script', cursive;
      font-size: 155px;
      font-weight: 700;
      font-style: italic;
    }
    .tv-text {
      font-family: 'Montserrat', 'Inter', 'Arial Black', sans-serif;
      font-size: 110px;
      font-weight: 900;
      letter-spacing: -2px;
    }
  </style>

  <g filter="url(#metallic-shadow)">
    <!-- Main Calligraphic Script Text "Kapjhaap" -->
    <text
      x="50"
      y="210"
      fill="url(#metallic-silver)"
      stroke="url(#bevel-dark)"
      stroke-width="3"
      className="script-text"
    >
      Kapjhaap
    </text>

    <!-- Underline Swoosh -->
    <path
      d="M 380 235 Q 550 245 780 285 Q 580 238 390 232 Z"
      fill="url(#metallic-silver)"
      stroke="url(#bevel-dark)"
      stroke-width="1"
    />

    <!-- Star 1 (Left, above first 'a' / 'p') -->
    <g transform="translate(345, 80) scale(0.85)">
      <!-- 5-Point 3D Beveled Star -->
      <!-- Center (0,0), Outer R=30, Inner R=12 -->
      <path d="M 0,-30 L 7,-9 L 0,0 Z" fill="url(#star-light)" />
      <path d="M 0,-30 L -7,-9 L 0,0 Z" fill="url(#star-dark)" />
      <path d="M 28,-9 L 11,3 L 0,0 Z" fill="url(#star-light)" />
      <path d="M 7,-9 L 28,-9 L 0,0 Z" fill="url(#star-dark)" />
      <path d="M 17,24 L 0,12 L 0,0 Z" fill="url(#star-light)" />
      <path d="M 11,3 L 17,24 L 0,0 Z" fill="url(#star-dark)" />
      <path d="M -17,24 L -11,3 L 0,0 Z" fill="url(#star-light)" />
      <path d="M 0,12 L -17,24 L 0,0 Z" fill="url(#star-dark)" />
      <path d="M -28,-9 L -7,-9 L 0,0 Z" fill="url(#star-light)" />
      <path d="M -11,3 L -28,-9 L 0,0 Z" fill="url(#star-dark)" />
    </g>

    <!-- Star 2 (Right, above second 'a') -->
    <g transform="translate(625, 100) scale(0.75)">
      <!-- 5-Point 3D Beveled Star -->
      <path d="M 0,-30 L 7,-9 L 0,0 Z" fill="url(#star-light)" />
      <path d="M 0,-30 L -7,-9 L 0,0 Z" fill="url(#star-dark)" />
      <path d="M 28,-9 L 11,3 L 0,0 Z" fill="url(#star-light)" />
      <path d="M 7,-9 L 28,-9 L 0,0 Z" fill="url(#star-dark)" />
      <path d="M 17,24 L 0,12 L 0,0 Z" fill="url(#star-light)" />
      <path d="M 11,3 L 17,24 L 0,0 Z" fill="url(#star-dark)" />
      <path d="M -17,24 L -11,3 L 0,0 Z" fill="url(#star-light)" />
      <path d="M 0,12 L -17,24 L 0,0 Z" fill="url(#star-dark)" />
      <path d="M -28,-9 L -7,-9 L 0,0 Z" fill="url(#star-light)" />
      <path d="M -11,3 L -28,-9 L 0,0 Z" fill="url(#star-dark)" />
    </g>

    <!-- TV Block Font -->
    <text
      x="800"
      y="195"
      fill="url(#tv-metallic)"
      stroke="url(#bevel-dark)"
      stroke-width="2.5"
      className="tv-text"
    >
      TV
    </text>
  </g>
</svg>
